# models.yaml — GET /v1/models
name: List Available Models
description: Returns the list of LLM models available to the system.
collection: system
tags:
  - smoke
  - system
  - readonly

request:
  method: GET
  path: /v1/models
  headers:
    Accept: application/json

response:
  status: 200

  snapshot: true
  ignore_fields:
    - "**.created"
    - "**.updated_at"

  shape:
    - 'has("data")'
    - '.data | type == "array"'
    - '.data | length > 0'
    - '.data[0] | has("id")'

post: |
  const body = ctx.response.body;
  assert(Array.isArray(body.data), '"data" must be an array');
  assert(body.data.length > 0, 'At least one model must be available');

  const modelIds = body.data.map((m: any) => m.id);
  ctx.log(`Available models (${modelIds.length}): ${modelIds.join(', ')}`);
  ctx.vars.availableModels = modelIds;
